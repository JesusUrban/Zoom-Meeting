<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Zoom Meetings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .meetings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            width: 100%;
        }

        .meeting-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            background: white;
        }

        .meeting-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .meeting-card:active {
            transform: translateY(-5px) scale(0.98);
        }

        .meeting-card a {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 60%;
            overflow: hidden;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .meeting-card:hover .image-wrapper img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.2) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            transition: background 0.3s ease;
        }

        .meeting-card:hover .overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0.1) 100%);
        }

        .meeting-title {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .meeting-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .zoom-icon {
            width: 20px;
            height: 20px;
            background: #2D8CFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .click-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 140, 255, 0.95);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .meeting-card:hover .click-hint {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* Tablet and up */
        @media (min-width: 768px) {
            h1 {
                font-size: 2.5rem;
                margin-bottom: 3rem;
            }

            .meetings-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2.5rem;
            }

            .meeting-title {
                font-size: 1.5rem;
            }

            .meeting-subtitle {
                font-size: 1rem;
            }

            .image-wrapper {
                padding-bottom: 70%;
            }
        }

        /* Desktop */
        @media (min-width: 1024px) {
            h1 {
                font-size: 3rem;
            }

            .meetings-grid {
                gap: 3rem;
            }

            .overlay {
                padding: 2rem;
            }
        }

        /* Animation on load */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .meeting-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .meeting-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .meeting-card:nth-child(2) {
            animation-delay: 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join Your Zoom Meetings</h1>
        
        <div class="meetings-grid">
            <!-- First Meeting Card -->


            <div class="meeting-card">
                <a href="https://us05web.zoom.us/j/85763974626?pwd=S3NfHvztGT41FCSVYgPlZa1TMetT5m.1" target="_blank" rel="noopener noreferrer">
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=800&h=600&fit=crop" alt="Team Meeting">
                        <div class="overlay">
                            <div class="click-hint">Click to Join</div>
                            <h2 class="meeting-title">Team Standup Meeting</h2>
                            <p class="meeting-subtitle">
                                <span class="zoom-icon">Z</span>
                                Daily sync with the team
                            </p>
                        </div>
                    </div>
                </a>
            </div>




            <!-- Second Meeting Card -->
            <div class="meeting-card">
                <a href="https://us05web.zoom.us/j/87088755658?pwd=NvJSSOy5MkIV9R8Oenba5mEL9wX5bn.1" target="_blank" rel="noopener noreferrer">
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=800&h=600&fit=crop" alt="Client Meeting">
                        <div class="overlay">
                            <div class="click-hint">Click to Join</div>
                            <h2 class="meeting-title">Client Presentation</h2>
                            <p class="meeting-subtitle">
                                <span class="zoom-icon">Z</span>
                                Quarterly review session
                            </p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
